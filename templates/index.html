<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Classroom Chat</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Join screen -->
  <div id="join" class="view">
    <h1>Classroom Chat</h1>
    <p class="subtitle">Gib deinen Namen ein, um beizutreten.</p>
    <form id="join-form">
      <input id="name-input" type="text" placeholder="Dein Name" maxlength="40" autofocus>
      <button type="submit">Beitreten</button>
      <p id="join-error" class="error" hidden>Bitte gib einen Namen ein.</p>
    </form>
  </div>

  <!-- Chat view -->
  <div id="chat" class="view" hidden>
    <div class="chat-header">
      <h1>Classroom Chat</h1>
      <p id="status" class="status"></p>
    </div>
    <div id="messages" class="messages"></div>
    <form id="msg-form" class="composer">
      <input id="msg-input" type="text" placeholder="Nachricht…" maxlength="1000" autocomplete="off">
      <button type="submit">Senden</button>
    </form>
  </div>

  <script>
    let myName = '';
    let ws = null;
    let retries = 0;
    const MAX_RETRIES = 10;
    const RETRY_DELAY_MS = 2000;

    const joinView  = document.getElementById('join');
    const chatView  = document.getElementById('chat');
    const statusEl  = document.getElementById('status');
    const messagesEl = document.getElementById('messages');
    const msgInput  = document.getElementById('msg-input');

    document.getElementById('join-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const raw = document.getElementById('name-input').value.trim().slice(0, 40);
      if (!raw) {
        document.getElementById('join-error').hidden = false;
        return;
      }
      myName = raw;
      joinView.hidden = true;
      chatView.hidden = false;
      connect();
    });

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws?name=' + encodeURIComponent(myName));

      ws.onopen = function () {
        retries = 0;
        setStatus('verbunden als ' + myName, false);
        msgInput.focus();
      };

      ws.onmessage = function (e) {
        let frame;
        try { frame = JSON.parse(e.data); } catch { return; }
        if (frame.type !== 'message' || !frame.message) return;
        appendMessage(frame.message);
      };

      ws.onclose = function () {
        if (retries >= MAX_RETRIES) {
          setStatus('offline — bitte Seite neu laden', true);
          return;
        }
        retries += 1;
        setStatus('reconnecting… (' + retries + '/' + MAX_RETRIES + ')', false);
        setTimeout(connect, RETRY_DELAY_MS);
      };

      ws.onerror = function () { ws.close(); };
    }

    function appendMessage(msg) {
      const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop <= messagesEl.clientHeight + 5;

      const article = document.createElement('article');
      article.className = 'message ' + (msg.name === myName ? 'mine' : 'other');

      const header = document.createElement('header');

      const sender = document.createElement('strong');
      sender.textContent = msg.name;

      const ts = document.createElement('time');
      ts.textContent = new Date(msg.ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      header.appendChild(sender);
      header.appendChild(ts);

      const text = document.createElement('p');
      text.textContent = msg.text;

      article.appendChild(header);
      article.appendChild(text);
      messagesEl.appendChild(article);

      if (atBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setStatus(text, offline) {
      statusEl.textContent = text;
      statusEl.className = 'status' + (offline ? ' offline' : '');
    }

    document.getElementById('msg-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const text = msgInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'post', text: text }));
      msgInput.value = '';
    });
  </script>
</body>
</html>
